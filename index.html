<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MiniCraft PC</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin:0; height:100%; background:#0b0f14;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow: hidden;
    }
    #wrap { position:fixed; inset:0; display:grid; place-items:center; }
    canvas {
      width:100vw; height:100vh; background:#0b0f14;
      image-rendering: pixelated;
    }

    .hud {
      position:fixed; left:0; top:0; right:0;
      display:flex; gap:12px; align-items:center; padding:12px;
      pointer-events:none; user-select:none;
    }
    .pill {
      background:rgba(18,24,32,.78);
      border:1px solid rgba(255,255,255,.10);
      padding:8px 14px; border-radius:12px;
      font-size:13px; line-height:1.25; color:#d8e4ff;
    }
    .bar {
      margin-left:auto; display:flex; gap:6px; align-items:center;
      background:rgba(18,24,32,.78); border:1px solid rgba(255,255,255,.10);
      padding:6px; border-radius:12px;
    }
    .slot {
      width:38px; height:38px; border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      display:grid; place-items:center; font-size:14px; color:#d8e4ff;
      background:rgba(0,0,0,.22); cursor:default;
    }
    .slot.sel {
      outline:2px solid rgba(130,180,255,.85);
      border-color:rgba(130,180,255,.6);
    }

    .hint {
      position:fixed; left:12px; right:12px; bottom:16px;
      display:flex; justify-content:center; pointer-events:none;
    }
    .hint .pill {
      max-width:640px; text-align:center; font-size:13px; padding:8px 14px;
    }

    #debug {
      position:fixed; left:12px; bottom:60px;
      background:rgba(0,0,0,0.6); color:#8af; font-size:12px;
      padding:4px 8px; border-radius:6px; pointer-events:none;
    }
  </style>
</head>
<body>

<div id="wrap"><canvas id="c"></canvas></div>

<div class="hud">
  <div class="pill"><b>MiniCraft PC</b><br><small>ЛКМ — сломать · ПКМ — поставить</small></div>
  <div class="bar" id="bar"></div>
</div>

<div class="hint">
  <div class="pill">
    WASD / стрелки — движение · Пробел — прыжок · 1–5 — выбор блока · Колёсико — смена · R — новый мир
  </div>
</div>

<div id="debug"></div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const debug  = document.getElementById('debug');

  function fit() {
    const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    canvas.width  = Math.round(innerWidth  * dpr);
    canvas.height = Math.round(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener('resize', fit, {passive:true});
  fit();

  // ─── Настройки ────────────────────────────────────────
  const TILE_BASE = 32;
  let   TILE = TILE_BASE;

  const W = 180, H = 80;
  const GRAV = 1400, MOVE = 120, JUMP = 480;
  const FRICTION = 0.58, AIR_CTRL = 0.10;

  const BLOCK = { AIR:0, GRASS:1, DIRT:2, STONE:3, WOOD:4, SAND:5 };
  const COLORS = {
    [BLOCK.AIR]:   null,
    [BLOCK.GRASS]: ['#2aa84a','#1f7f37'],
    [BLOCK.DIRT]:  ['#8a5a34','#6b4528'],
    [BLOCK.STONE]: ['#8e98a5','#707984'],
    [BLOCK.WOOD]:  ['#b07b3a','#8e612e'],
    [BLOCK.SAND]:  ['#e2d39b','#cdbf85'],
  };
  const blockNames = {
    [BLOCK.GRASS]:'Grass',
    [BLOCK.DIRT]:'Dirt',
    [BLOCK.STONE]:'Stone',
    [BLOCK.WOOD]:'Wood',
    [BLOCK.SAND]:'Sand',
  };

  const hotbar = [BLOCK.GRASS, BLOCK.DIRT, BLOCK.STONE, BLOCK.WOOD, BLOCK.SAND];
  let selected = hotbar[0];

  // Интерфейс хотбара
  const bar = document.getElementById('bar');
  const slots = hotbar.map((id, i) => {
    const el = document.createElement('div');
    el.className = 'slot' + (i===0 ? ' sel' : '');
    el.textContent = (i+1);
    el.title = blockNames[id];
    bar.appendChild(el);
    return el;
  });

  function updateSlots() {
    slots.forEach((el,i) => el.classList.toggle('sel', hotbar[i]===selected));
  }

  // ─── Мир ──────────────────────────────────────────────
  const world = new Uint8Array(W * H);
  const idx   = (x,y) => x + y*W;
  const inside = (x,y) => x>=0 && y>=0 && x<W && y<H;
  const get = (x,y) => inside(x,y) ? world[idx(x,y)] : BLOCK.STONE;
  const set = (x,y,v) => { if (inside(x,y)) world[idx(x,y)] = v; };

  function generateWorld() {
    world.fill(BLOCK.AIR);
    const base = Math.floor(H * 0.56);

    let h = base;
    for (let x = 0; x < W; x++) {
      h += (Math.random()*2 - 1) * 1.2;
      h = Math.max(base-9, Math.min(base+9, h));
      const top = Math.floor(h);

      set(x, top, BLOCK.GRASS);
      for (let y = top+1; y < H; y++) {
        if (y < top + 6) set(x, y, BLOCK.DIRT);
        else             set(x, y, BLOCK.STONE);
      }

      // песчаные пятна
      if (Math.random() < 0.07) {
        for (let dy = 0; dy < 3; dy++)
          if (top + dy < H) set(x, top + dy, BLOCK.SAND);
      }

      // деревья
      if (Math.random() < 0.04) {
        const th = 3 + (Math.random()*4|0);
        for (let t = 1; t <= th; t++) if (top-t >= 0) set(x, top-t, BLOCK.WOOD);
        for (let dx = -2; dx <= 2; dx++)
          for (let dy = -3; dy <= 0; dy++) {
            if (Math.abs(dx) + Math.abs(dy) <= 4 && Math.random() > 0.25) {
              set(x+dx, top-th+dy, BLOCK.WOOD);
            }
          }
      }
    }
  }
  generateWorld();

  // ─── Игрок и камера ──────────────────────────────────
  const player = { x: W*TILE_BASE*0.5, y: H*TILE_BASE*0.3, w:22, h:46, vx:0, vy:0, onGround:false };
  const cam    = { x:0, y:0 };

  // ─── Управление (ПК) ─────────────────────────────────
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'r' || e.key === 'R') {
      generateWorld();
      player.x = W*TILE_BASE*0.5;
      player.y = 100;
      player.vx = player.vy = 0;
    }
  });
  window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

  // Выбор блока цифрами
  window.addEventListener('keydown', e => {
    const n = parseInt(e.key);
    if (n >= 1 && n <= hotbar.length) {
      selected = hotbar[n-1];
      updateSlots();
    }
  });

  // Колёсико мыши — смена блока
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const dir = e.deltaY > 0 ? 1 : -1;
    let i = hotbar.indexOf(selected);
    i = (i + dir + hotbar.length) % hotbar.length;
    selected = hotbar[i];
    updateSlots();
  }, {passive:false});

  // Мышь — ломать / ставить
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0 && e.button !== 2) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const wx = mx + cam.x;
    const wy = my + cam.y;
    const tx = Math.floor(wx / TILE);
    const ty = Math.floor(wy / TILE);

    const px = player.x + player.w/2;
    const py = player.y + player.h/2;
    if (Math.hypot((tx+0.5)*TILE - px, (ty+0.5)*TILE - py) > 260) return;

    if (e.button === 0) {          // ЛКМ — сломать
      if (get(tx,ty) !== BLOCK.AIR) set(tx,ty, BLOCK.AIR);
    }
    else if (e.button === 2) {     // ПКМ — поставить
      if (get(tx,ty) === BLOCK.AIR) {
        const wouldCollide =
          tx*TILE < player.x + player.w &&
          (tx+1)*TILE > player.x &&
          ty*TILE < player.y + player.h &&
          (ty+1)*TILE > player.y;
        if (!wouldCollide) set(tx,ty, selected);
      }
    }
  });

  // ─── Физика ──────────────────────────────────────────
  function solidAt(px, py) {
    return get(Math.floor(px/TILE), Math.floor(py/TILE)) !== BLOCK.AIR;
  }

  function moveAndCollide(dt) {
    player.onGround = false;

    // горизонталь
    player.x += player.vx * dt;
    if (player.vx !== 0) {
      const dir = Math.sign(player.vx);
      const edgeX = dir > 0 ? player.x + player.w : player.x;
      const t = dir > 0 ? -0.001 : 0.001;
      for (let y = player.y + 2; y < player.y + player.h - 2; y += 12) {
        if (solidAt(edgeX + t, y)) {
          player.x = dir > 0
            ? Math.floor(edgeX / TILE) * TILE - player.w
            : (Math.floor(edgeX / TILE) + 1) * TILE;
          player.vx = 0;
          break;
        }
      }
    }

    // вертикаль
    player.y += player.vy * dt;
    if (player.vy !== 0) {
      const dir = Math.sign(player.vy);
      const edgeY = dir > 0 ? player.y + player.h : player.y;
      const t = dir > 0 ? -0.001 : 0.001;
      for (let x = player.x + 2; x < player.x + player.w - 2; x += 12) {
        if (solidAt(x, edgeY + t)) {
          player.y = dir > 0
            ? Math.floor(edgeY / TILE) * TILE - player.h
            : (Math.floor(edgeY / TILE) + 1) * TILE;
          player.vy = 0;
          if (dir > 0) player.onGround = true;
          break;
        }
      }
    }
  }

  // ─── Отрисовка ───────────────────────────────────────
  function drawBackground() {
    const g = ctx.createLinearGradient(0,0,0,innerHeight);
    g.addColorStop(0, '#103048');
    g.addColorStop(0.55, '#0b1c2a');
    g.addColorStop(1, '#071018');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,innerWidth,innerHeight);
  }

  function drawTile(x, y, id) {
    const pal = COLORS[id];
    if (!pal) return;
    const px = x * TILE - cam.x;
    const py = y * TILE - cam.y;

    ctx.fillStyle = pal[0];
    ctx.fillRect(px, py, TILE, TILE);

    ctx.fillStyle = pal[1];
    ctx.fillRect(px, py + TILE - 7, TILE, 7);
    ctx.fillRect(px + TILE - 7, py, 7, TILE);

    ctx.globalAlpha = 0.11;
    for (let i = 0; i < 4; i++) {
      const nx = px + (Math.random()*TILE|0);
      const ny = py + (Math.random()*TILE|0);
      ctx.fillRect(nx, ny, 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer() {
    const px = player.x - cam.x;
    const py = player.y - cam.y;
    ctx.fillStyle = '#f2c39b'; ctx.fillRect(px+5, py+8,  player.w-10, 14);
    ctx.fillStyle = '#2d7bd6'; ctx.fillRect(px+4, py+22, player.w-8,  player.h-26);
    ctx.fillStyle = '#0b0f14';
    ctx.fillRect(px+8, py+12, 3,3);
    ctx.fillRect(px+player.w-11, py+12, 3,3);

    ctx.globalAlpha = 0.9;
    ctx.fillStyle = COLORS[selected][0];
    ctx.fillRect(px + player.w - 8, py + player.h - 22, 14, 14);
    ctx.globalAlpha = 1;
  }

  function drawTarget() {
    const mx = mouse.x + cam.x;
    const my = mouse.y + cam.y;
    const tx = Math.floor(mx / TILE);
    const ty = Math.floor(my / TILE);
    const px = tx * TILE - cam.x;
    const py = ty * TILE - cam.y;

    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = 'rgba(140,190,255,0.9)';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
    ctx.globalAlpha = 1;
  }

  let mouse = {x: innerWidth/2, y: innerHeight/2};
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });

  // ─── Игровой цикл ────────────────────────────────────
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last)/1000);
    last = now;

    // ввод
    let ax = 0;
    if (keys['a'] || keys['arrowleft'])  ax -= 1;
    if (keys['d'] || keys['arrowright']) ax += 1;

    const accel = player.onGround ? 1 : AIR_CTRL;
    player.vx += ax * MOVE * accel * 1.4;
    player.vx *= player.onGround ? FRICTION : 0.975;

    player.vy += GRAV * dt;

    if ((keys[' '] || keys['w'] || keys['arrowup']) && player.onGround) {
      player.vy = -JUMP;
      player.onGround = false;
    }

    moveAndCollide(dt);

    cam.x = player.x + player.w/2 - innerWidth/2;
    cam.y = player.y + player.h/2 - innerHeight/2;
    cam.x = Math.max(0, Math.min(cam.x, W*TILE - innerWidth));
    cam.y = Math.max(0, Math.min(cam.y, H*TILE - innerHeight));

    drawBackground();

    const x0 = Math.max(0, Math.floor(cam.x / TILE) - 1);
    const y0 = Math.max(0, Math.floor(cam.y / TILE) - 1);
    const x1 = Math.min(W-1, Math.floor((cam.x + innerWidth)  / TILE) + 1);
    const y1 = Math.min(H-1, Math.floor((cam.y + innerHeight) / TILE) + 1);

    for (let y = y0; y <= y1; y++)
      for (let x = x0; x <= x1; x++) {
        const id = get(x,y);
        if (id !== BLOCK.AIR) drawTile(x, y, id);
      }

    drawPlayer();
    drawTarget();

    // отладка / координаты
    const tx = Math.floor((mouse.x + cam.x)/TILE);
    const ty = Math.floor((mouse.y + cam.y)/TILE);
    const bid = get(tx, ty);
    debug.textContent = `Цель: (${tx}, ${ty})  ${bid ? blockNames[bid] : 'Air'}`;

    requestAnimationFrame(loop);
  }

  updateSlots();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
