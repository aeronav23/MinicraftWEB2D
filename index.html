<!doctype html>  
<html lang="ru">  
<head>  
  <meta charset="utf-8" />  
  <meta name="viewport" content="width=device-width,initial-scale=1" />  
  <title>MiniCraft PC</title>  
  <style>  
    :root { color-scheme: dark; }  
    html, body {  
      margin:0;  
      height:100%;  
      background:#0b0f14;  
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;  
      overflow:hidden;  
    }  
  
    #wrap {  
      position:fixed;  
      inset:0;  
      display:grid;  
      place-items:center;  
    }  
  
    canvas {  
      width:100vw;  
      height:100vh;  
      background:#0b0f14;  
      image-rendering:pixelated;  
    }  
  
    .hud {  
      position:fixed;  
      left:0;  
      top:0;  
      right:0;  
      display:flex;  
      gap:12px;  
      align-items:center;  
      padding:12px;  
      pointer-events:none;  
      user-select:none;  
    }  
  
    .pill {  
      background:rgba(18,24,32,.78);  
      border:1px solid rgba(255,255,255,.10);  
      padding:8px 14px;  
      border-radius:12px;  
      font-size:13px;  
      line-height:1.25;  
      color:#d8e4ff;  
    }  
  
    .bar {  
      margin-left:auto;  
      display:flex;  
      gap:6px;  
      align-items:center;  
      background:rgba(18,24,32,.78);  
      border:1px solid rgba(255,255,255,.10);  
      padding:6px;  
      border-radius:12px;  
    }  
  
    .slot {  
      width:38px;  
      height:38px;  
      border-radius:10px;  
      border:1px solid rgba(255,255,255,.14);  
      display:grid;  
      place-items:center;  
      font-size:14px;  
      color:#d8e4ff;  
      background:rgba(0,0,0,.22);  
      cursor:default;  
    }  
  
    .slot.sel {  
      outline:2px solid rgba(130,180,255,.85);  
      border-color:rgba(130,180,255,.6);  
    }  
  
    .hint {  
      position:fixed;  
      left:12px;  
      right:12px;  
      bottom:16px;  
      display:flex;  
      justify-content:center;  
      pointer-events:none;  
    }  
  
    .hint .pill {  
      max-width:760px;  
      text-align:center;  
      font-size:13px;  
      padding:8px 14px;  
    }  
  
    #debug {  
      position:fixed;  
      left:12px;  
      bottom:60px;  
      background:rgba(0,0,0,0.6);  
      color:#8af;  
      font-size:12px;  
      padding:4px 8px;  
      border-radius:6px;  
      pointer-events:none;  
    }  
  
    #hearts {  
      position:fixed;  
      left:12px;  
      top:74px;  
      display:flex;  
      gap:6px;  
      font-size:24px;  
      pointer-events:none;  
      user-select:none;  
      text-shadow:0 1px 0 rgba(0,0,0,.6);  
    }  
  </style>  
</head>  
<body>  
  
<div id="wrap"><canvas id="c"></canvas></div>  
  
<div class="hud">  
  <div class="pill">  
    <b>MiniCraft PC</b><br>  
    <small>ЛКМ — ломать / бить / открыть дверь · ПКМ — поставить</small>  
  </div>  
  <div class="bar" id="bar"></div>  
</div>  
  
<div id="hearts"></div>  
  
<div class="hint">  
  <div class="pill">  
    WASD / стрелки — движение · Пробел — прыжок · 1–6 — выбор блока · Колёсико — смена · R — новый мир  
  </div>  
</div>  
  
<div id="debug"></div>  
  
<script>  
(() => {  
  const canvas = document.getElementById('c');  
  const ctx = canvas.getContext('2d');  
  const debug = document.getElementById('debug');  
  const heartsEl = document.getElementById('hearts');  
  
  function fit() {  
    const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));  
    canvas.width = Math.round(innerWidth * dpr);  
    canvas.height = Math.round(innerHeight * dpr);  
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  
  }  
  addEventListener('resize', fit, { passive:true });  
  fit();  
  
  const TILE_BASE = 32;  
  let TILE = TILE_BASE;  
  
  const W = 180;  
  const H = 80;  
  
  const GRAV = 1400;  
  const MOVE = 120;  
  const JUMP = 480;  
  const FRICTION = 0.58;  
  const AIR_CTRL = 0.10;  
  
  const BLOCK = {  
    AIR:0,  
    GRASS:1,  
    DIRT:2,  
    STONE:3,  
    WOOD:4,  
    SAND:5,  
    DOOR_CLOSED:6,  
    DOOR_OPEN:7  
  };  
  
  const COLORS = {  
    [BLOCK.AIR]: null,  
    [BLOCK.GRASS]: ['#2aa84a','#1f7f37'],  
    [BLOCK.DIRT]:  ['#8a5a34','#6b4528'],  
    [BLOCK.STONE]: ['#8e98a5','#707984'],  
    [BLOCK.WOOD]:  ['#b07b3a','#8e612e'],  
    [BLOCK.SAND]:  ['#e2d39b','#cdbf85'],  
    [BLOCK.DOOR_CLOSED]: ['#7a4a1f','#5a3213'],  
    [BLOCK.DOOR_OPEN]: ['#7a4a1f','#5a3213']  
  };  
  
  const blockNames = {  
    [BLOCK.GRASS]:'Grass',  
    [BLOCK.DIRT]:'Dirt',  
    [BLOCK.STONE]:'Stone',  
    [BLOCK.WOOD]:'Wood',  
    [BLOCK.SAND]:'Sand',  
    [BLOCK.DOOR_CLOSED]:'Door',  
    [BLOCK.DOOR_OPEN]:'Door Open'  
  };  
  
  const hotbar = [  
    BLOCK.GRASS,  
    BLOCK.DIRT,  
    BLOCK.STONE,  
    BLOCK.WOOD,  
    BLOCK.SAND,  
    BLOCK.DOOR_CLOSED  
  ];  
  
  let selected = hotbar[0];  
  
  const bar = document.getElementById('bar');  
  const slots = hotbar.map((id, i) => {  
    const el = document.createElement('div');  
    el.className = 'slot' + (i === 0 ? ' sel' : '');  
    el.textContent = String(i + 1);  
    el.title = blockNames[id];  
    bar.appendChild(el);  
    return el;  
  });  
  
  function updateSlots() {  
    slots.forEach((el, i) => {  
      el.classList.toggle('sel', hotbar[i] === selected);  
    });  
  }  
  
  const world = new Uint8Array(W * H);  
  const idx = (x, y) => x + y * W;  
  const inside = (x, y) => x >= 0 && y >= 0 && x < W && y < H;  
  const get = (x, y) => inside(x, y) ? world[idx(x, y)] : BLOCK.STONE;  
  const set = (x, y, v) => {  
    if (inside(x, y)) world[idx(x, y)] = v;  
  };  
  
  function isSolidBlock(id) {  
    return id !== BLOCK.AIR && id !== BLOCK.DOOR_OPEN;  
  }  
  
  const player = {  
    x: W * TILE_BASE * 0.5,  
    y: H * TILE_BASE * 0.3,  
    w:22,  
    h:46,  
    vx:0,  
    vy:0,  
    onGround:false,  
    hp:5,  
    hitTimer:0  
  };  
  
  const cam = { x:0, y:0 };  
  
  const monsters = [];  
  
  function drawHearts() {  
    heartsEl.textContent = '';  
    for (let i = 0; i < 5; i++) {  
      heartsEl.textContent += i < player.hp ? '❤️' : '🖤';  
    }  
  }  
  
  function spawnMonster(x, y) {  
    monsters.push({  
      x,  
      y,  
      w:22,  
      h:38,  
      vx:35 + Math.random() * 20,  
      vy:0,  
      dir:Math.random() < 0.5 ? -1 : 1,  
      onGround:false,  
      hp:2  
    });  
  }  
  
  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {  
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;  
  }  
  
  function solidAt(px, py) {  
    const tx = Math.floor(px / TILE);  
    const ty = Math.floor(py / TILE);  
    return isSolidBlock(get(tx, ty));  
  }  
  
  function findGroundY(worldX) {  
    const tx = Math.max(0, Math.min(W - 1, Math.floor(worldX / TILE_BASE)));  
    for (let y = 0; y < H; y++) {  
      if (isSolidBlock(get(tx, y))) {  
        return y * TILE_BASE - 38;  
      }  
    }  
    return 100;  
  }  
  
  function generateWorld() {  
    world.fill(BLOCK.AIR);  
    monsters.length = 0;  
  
    const base = Math.floor(H * 0.56);  
    let h = base;  
  
    for (let x = 0; x < W; x++) {  
      h += (Math.random() * 2 - 1) * 1.2;  
      h = Math.max(base - 9, Math.min(base + 9, h));  
      const top = Math.floor(h);  
  
      set(x, top, BLOCK.GRASS);  
  
      for (let y = top + 1; y < H; y++) {  
        if (y < top + 6) set(x, y, BLOCK.DIRT);  
        else set(x, y, BLOCK.STONE);  
      }  
  
      if (Math.random() < 0.07) {  
        for (let dy = 0; dy < 3; dy++) {  
          if (top + dy < H) set(x, top + dy, BLOCK.SAND);  
        }  
      }  
  
      if (Math.random() < 0.04) {  
        const th = 3 + (Math.random() * 4 | 0);  
        for (let t = 1; t <= th; t++) {  
          if (top - t >= 0) set(x, top - t, BLOCK.WOOD);  
        }  
  
        for (let dx = -2; dx <= 2; dx++) {  
          for (let dy = -3; dy <= 0; dy++) {  
            if (Math.abs(dx) + Math.abs(dy) <= 4 && Math.random() > 0.25) {  
              set(x + dx, top - th + dy, BLOCK.WOOD);  
            }  
          }  
        }  
      }  
    }  
  
    for (let i = 0; i < 8; i++) {  
      const mx = 100 + Math.random() * (W * TILE_BASE - 200);  
      const my = findGroundY(mx);  
      spawnMonster(mx, my);  
    }  
  
    player.hp = 5;  
    player.hitTimer = 0;  
    drawHearts();  
  }  
  
  generateWorld();  
  
  const keys = {};  
  
  addEventListener('keydown', e => {  
    keys[e.key.toLowerCase()] = true;  
  
    if (e.key === 'r' || e.key === 'R') {  
      generateWorld();  
      player.x = W * TILE_BASE * 0.5;  
      player.y = 100;  
      player.vx = 0;  
      player.vy = 0;  
    }  
  });  
  
  addEventListener('keyup', e => {  
    keys[e.key.toLowerCase()] = false;  
  });  
  
  addEventListener('keydown', e => {  
    const n = parseInt(e.key);  
    if (n >= 1 && n <= hotbar.length) {  
      selected = hotbar[n - 1];  
      updateSlots();  
    }  
  });  
  
  canvas.addEventListener('wheel', e => {  
    e.preventDefault();  
    const dir = e.deltaY > 0 ? 1 : -1;  
    let i = hotbar.indexOf(selected);  
    i = (i + dir + hotbar.length) % hotbar.length;  
    selected = hotbar[i];  
    updateSlots();  
  }, { passive:false });  
  
  canvas.addEventListener('contextmenu', e => e.preventDefault());  
  
  let mouse = { x: innerWidth / 2, y: innerHeight / 2 };  
  
  canvas.addEventListener('mousemove', e => {  
    const r = canvas.getBoundingClientRect();  
    mouse.x = e.clientX - r.left;  
    mouse.y = e.clientY - r.top;  
  });  
  
  function damagePlayer() {  
    if (player.hitTimer > 0) return;  
  
    player.hp--;  
    player.hitTimer = 1.0;  
    drawHearts();  
  
    if (player.hp <= 0) {  
      alert('Ты проиграл. Мир создан заново.');  
      generateWorld();  
      player.x = W * TILE_BASE * 0.5;  
      player.y = 100;  
      player.vx = 0;  
      player.vy = 0;  
    }  
  }  
  
  canvas.addEventListener('mousedown', e => {  
    if (e.button !== 0 && e.button !== 2) return;  
  
    const rect = canvas.getBoundingClientRect();  
    const mx = e.clientX - rect.left;  
    const my = e.clientY - rect.top;  
  
    const wx = mx + cam.x;  
    const wy = my + cam.y;  
    const tx = Math.floor(wx / TILE);  
    const ty = Math.floor(wy / TILE);  
  
    const px = player.x + player.w / 2;  
    const py = player.y + player.h / 2;  
  
    if (Math.hypot((tx + 0.5) * TILE - px, (ty + 0.5) * TILE - py) > 260) return;  
  
    if (e.button === 0) {  
      const id = get(tx, ty);  
  
  if (id === BLOCK.DOOR_CLOSED || id === BLOCK.DOOR_OPEN) {
  if (e.shiftKey) {
    set(tx, ty, BLOCK.AIR); // сломать дверь
    return;
  }

  if (id === BLOCK.DOOR_CLOSED) {
    set(tx, ty, BLOCK.DOOR_OPEN); // открыть
    return;
  }

  if (id === BLOCK.DOOR_OPEN) {
    const wouldCloseOnPlayer =
      tx * TILE < player.x + player.w &&
      (tx + 1) * TILE > player.x &&
      ty * TILE < player.y + player.h &&
      (ty + 1) * TILE > player.y;

    let wouldCloseOnMonster = false;
    for (const m of monsters) {
      if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h)) {
        wouldCloseOnMonster = true;
        break;
      }
    }

    if (!wouldCloseOnPlayer && !wouldCloseOnMonster) {
      set(tx, ty, BLOCK.DOOR_CLOSED); // закрыть
    }
    return;
  }
}
  
      let hitMonster = false;  
      for (let i = monsters.length - 1; i >= 0; i--) {  
        const m = monsters[i];  
        if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h)) {  
          m.hp--;  
          if (m.hp <= 0) monsters.splice(i, 1);  
          hitMonster = true;  
          break;  
        }  
      }  
      if (hitMonster) return;  
  
      if (id !== BLOCK.AIR) {  
        set(tx, ty, BLOCK.AIR);  
      }  
    }  
  
    if (e.button === 2) {  
      if (get(tx, ty) !== BLOCK.AIR) return;  
  
      const placeId = selected === BLOCK.DOOR_CLOSED ? BLOCK.DOOR_CLOSED : selected;  
  
      const wouldCollidePlayer =  
        tx * TILE < player.x + player.w &&  
        (tx + 1) * TILE > player.x &&  
        ty * TILE < player.y + player.h &&  
        (ty + 1) * TILE > player.y;  
  
      let wouldCollideMonster = false;  
      for (const m of monsters) {  
        if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h)) {  
          wouldCollideMonster = true;  
          break;  
        }  
      }  
  
      if (!wouldCollidePlayer && !wouldCollideMonster) {  
        set(tx, ty, placeId);  
      }  
    }  
  });  
  
  function movePlayerAndCollide(dt) {  
    player.onGround = false;  
  
    player.x += player.vx * dt;  
    if (player.vx !== 0) {  
      const dir = Math.sign(player.vx);  
      const edgeX = dir > 0 ? player.x + player.w : player.x;  
      const t = dir > 0 ? -0.001 : 0.001;  
  
      for (let y = player.y + 2; y < player.y + player.h - 2; y += 12) {  
        if (solidAt(edgeX + t, y)) {  
          player.x = dir > 0  
            ? Math.floor(edgeX / TILE) * TILE - player.w  
            : (Math.floor(edgeX / TILE) + 1) * TILE;  
          player.vx = 0;  
          break;  
        }  
      }  
    }  
  
    player.y += player.vy * dt;  
    if (player.vy !== 0) {  
      const dir = Math.sign(player.vy);  
      const edgeY = dir > 0 ? player.y + player.h : player.y;  
      const t = dir > 0 ? -0.001 : 0.001;  
  
      for (let x = player.x + 2; x < player.x + player.w - 2; x += 12) {  
        if (solidAt(x, edgeY + t)) {  
          player.y = dir > 0  
            ? Math.floor(edgeY / TILE) * TILE - player.h  
            : (Math.floor(edgeY / TILE) + 1) * TILE;  
          player.vy = 0;  
          if (dir > 0) player.onGround = true;  
          break;  
        }  
      }  
    }  
  }  
  
  function moveMonster(m, dt) {  
    m.onGround = false;  
    m.vy += GRAV * dt;  
  
    m.x += m.vx * m.dir * dt;  
  
    const dir = Math.sign(m.vx * m.dir || m.dir);  
    const edgeX = dir > 0 ? m.x + m.w : m.x;  
    const t = dir > 0 ? -0.001 : 0.001;  
    let hitWall = false;  
  
    for (let y = m.y + 2; y < m.y + m.h - 2; y += 12) {  
      if (solidAt(edgeX + t, y)) {  
        m.x = dir > 0  
          ? Math.floor(edgeX / TILE) * TILE - m.w  
          : (Math.floor(edgeX / TILE) + 1) * TILE;  
        hitWall = true;  
        break;  
      }  
    }  
  
    const footX = dir > 0 ? m.x + m.w + 2 : m.x - 2;  
    const footY = m.y + m.h + 2;  
    if (!solidAt(footX, footY)) hitWall = true;  
  
    if (hitWall) m.dir *= -1;  
  
    m.y += m.vy * dt;  
  
    if (m.vy !== 0) {  
      const vdir = Math.sign(m.vy);  
      const edgeY = vdir > 0 ? m.y + m.h : m.y;  
      const t2 = vdir > 0 ? -0.001 : 0.001;  
  
      for (let x = m.x + 2; x < m.x + m.w - 2; x += 12) {  
        if (solidAt(x, edgeY + t2)) {  
          m.y = vdir > 0  
            ? Math.floor(edgeY / TILE) * TILE - m.h  
            : (Math.floor(edgeY / TILE) + 1) * TILE;  
          m.vy = 0;  
          if (vdir > 0) m.onGround = true;  
          break;  
        }  
      }  
    }  
  }  
  
  function drawBackground() {  
    const g = ctx.createLinearGradient(0, 0, 0, innerHeight);  
   g.addColorStop(0, '#87CEEB');
   g.addColorStop(0.6, '#6ec6ff');
   g.addColorStop(1, '#3fa7ff');
    ctx.fillStyle = g;  
    ctx.fillRect(0, 0, innerWidth, innerHeight);  
  }  
  
  function drawTile(x, y, id) {  
    const px = x * TILE - cam.x;  
    const py = y * TILE - cam.y;  
  
    if (id === BLOCK.DOOR_CLOSED) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + 5, py + 2, TILE - 10, TILE - 2);  
  
      ctx.fillStyle = '#5a3213';  
      ctx.fillRect(px + TILE - 10, py + 2, 5, TILE - 2);  
  
      ctx.fillStyle = '#d9b36a';  
      ctx.beginPath();  
      ctx.arc(px + TILE - 13, py + TILE / 2, 2.5, 0, Math.PI * 2);  
      ctx.fill();  
      return;  
    }  
  
    if (id === BLOCK.DOOR_OPEN) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + TILE - 9, py + 2, 6, TILE - 2);  
  
      ctx.fillStyle = '#d9b36a';  
      ctx.beginPath();  
      ctx.arc(px + TILE - 12, py + TILE / 2, 2.5, 0, Math.PI * 2);  
      ctx.fill();  
      return;  
    }  
  
    const pal = COLORS[id];  
    if (!pal) return;  
  
    ctx.fillStyle = pal[0];  
    ctx.fillRect(px, py, TILE, TILE);  
  
    ctx.fillStyle = pal[1];  
    ctx.fillRect(px, py + TILE - 7, TILE, 7);  
    ctx.fillRect(px + TILE - 7, py, 7, TILE);  
  
    ctx.globalAlpha = 0.11;  
    for (let i = 0; i < 4; i++) {  
      const nx = px + (Math.random() * TILE | 0);  
      const ny = py + (Math.random() * TILE | 0);  
      ctx.fillRect(nx, ny, 2, 2);  
    }  
    ctx.globalAlpha = 1;  
  }  
  
  function drawPlayer() {  
    const px = player.x - cam.x;  
    const py = player.y - cam.y;  
  
    if (player.hitTimer > 0 && Math.floor(player.hitTimer * 20) % 2 === 0) {  
      ctx.globalAlpha = 0.55;  
    }  
  
    ctx.fillStyle = '#f2c39b';  
    ctx.fillRect(px + 5, py + 8, player.w - 10, 14);  
  
    ctx.fillStyle = '#2d7bd6';  
    ctx.fillRect(px + 4, py + 22, player.w - 8, player.h - 26);  
  
    ctx.fillStyle = '#0b0f14';  
    ctx.fillRect(px + 8, py + 12, 3, 3);  
    ctx.fillRect(px + player.w - 11, py + 12, 3, 3);  
  
    ctx.globalAlpha = 0.9;  
    ctx.fillStyle = COLORS[selected][0];  
    ctx.fillRect(px + player.w - 8, py + player.h - 22, 14, 14);  
  
    ctx.globalAlpha = 1;  
  }  
  
  function drawMonsters() {  
    for (const m of monsters) {  
      const px = m.x - cam.x;  
      const py = m.y - cam.y;  
  
      ctx.fillStyle = '#6f2222';  
      ctx.fillRect(px, py + 8, m.w, m.h - 8);  
  
      ctx.fillStyle = '#8f2d2d';  
      ctx.fillRect(px + 2, py, m.w - 4, 14);  
  
      ctx.fillStyle = '#ff4a4a';  
      ctx.fillRect(px + 4, py + 4, 4, 4);  
      ctx.fillRect(px + m.w - 8, py + 4, 4, 4);  
  
      ctx.fillStyle = '#2b0c0c';  
      ctx.fillRect(px + 5, py + m.h - 6, 4, 6);  
      ctx.fillRect(px + m.w - 9, py + m.h - 6, 4, 6);  
    }  
  }  
  
  function drawTarget() {  
    const mx = mouse.x + cam.x;  
    const my = mouse.y + cam.y;  
    const tx = Math.floor(mx / TILE);  
    const ty = Math.floor(my / TILE);  
    const px = tx * TILE - cam.x;  
    const py = ty * TILE - cam.y;  
  
    ctx.globalAlpha = 0.8;  
    ctx.strokeStyle = 'rgba(140,190,255,0.9)';  
    ctx.lineWidth = 2.5;  
    ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);  
    ctx.globalAlpha = 1;  
  }  
  
  let last = performance.now();  
  
  function loop(now) {  
    const dt = Math.min(0.033, (now - last) / 1000);  
    last = now;  
  
    let ax = 0;  
    if (keys['a'] || keys['arrowleft']) ax -= 1;  
    if (keys['d'] || keys['arrowright']) ax += 1;  
  
    const accel = player.onGround ? 1 : AIR_CTRL;  
    player.vx += ax * MOVE * accel * 1.4;  
    player.vx *= player.onGround ? FRICTION : 0.975;  
  
    player.vy += GRAV * dt;  
  
    if ((keys[' '] || keys['w'] || keys['arrowup']) && player.onGround) {  
      player.vy = -JUMP;  
      player.onGround = false;  
    }  
  
    movePlayerAndCollide(dt);  
  
    for (const m of monsters) {  
      moveMonster(m, dt);  
  
      if (rectsOverlap(player.x, player.y, player.w, player.h, m.x, m.y, m.w, m.h)) {  
        damagePlayer();  
      }  
    }  
  
    if (player.hitTimer > 0) {  
      player.hitTimer -= dt;  
      if (player.hitTimer < 0) player.hitTimer = 0;  
    }  
  
    cam.x = player.x + player.w / 2 - innerWidth / 2;  
    cam.y = player.y + player.h / 2 - innerHeight / 2;  
    cam.x = Math.max(0, Math.min(cam.x, W * TILE - innerWidth));  
    cam.y = Math.max(0, Math.min(cam.y, H * TILE - innerHeight));  
  
    drawBackground();  
  
    const x0 = Math.max(0, Math.floor(cam.x / TILE) - 1);  
    const y0 = Math.max(0, Math.floor(cam.y / TILE) - 1);  
    const x1 = Math.min(W - 1, Math.floor((cam.x + innerWidth) / TILE) + 1);  
    const y1 = Math.min(H - 1, Math.floor((cam.y + innerHeight) / TILE) + 1);  
  
    for (let y = y0; y <= y1; y++) {  
      for (let x = x0; x <= x1; x++) {  
        const id = get(x, y);  
        if (id !== BLOCK.AIR) drawTile(x, y, id);  
      }  
    }  
  
    drawMonsters();  
    drawPlayer();  
    drawTarget();  
  
    const tx = Math.floor((mouse.x + cam.x) / TILE);  
    const ty = Math.floor((mouse.y + cam.y) / TILE);  
    const bid = get(tx, ty);  
  
    debug.textContent =  
      `Цель: (${tx}, ${ty})  ${bid ? blockNames[bid] : 'Air'}  |  Монстров: ${monsters.length}`;  
  
    requestAnimationFrame(loop);  
  }  
  
  updateSlots();  
  drawHearts();  
  requestAnimationFrame(loop);  
})();  
</script>  
</body>  
</html>
