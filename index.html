<!doctype html>  
<html lang="ru">  
<head>  
<meta charset="utf-8">  
<meta name="viewport" content="width=device-width,initial-scale=1">  
<title>MiniCraft</title>  
<style>  
  :root { color-scheme: dark; }  
  
  html, body {  
    margin: 0;  
    height: 100%;  
    overflow: hidden;  
    background: #0b0f14;  
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;  
  }  
  
  canvas {  
    width: 100vw;  
    height: 100vh;  
    display: block;  
    image-rendering: pixelated;  
  }  
  
  #hud {  
    position: fixed;  
    left: 10px;  
    top: 10px;  
    z-index: 5;  
    color: white;  
    user-select: none;  
    text-shadow: 0 1px 2px rgba(0,0,0,.6);  
    font-size: 14px;  
  }  
  
  #hearts {  
    font-size: 24px;  
    margin-bottom: 6px;  
  }  
  
  #info {  
    background: rgba(0,0,0,.28);  
    padding: 8px 10px;  
    border-radius: 10px;  
    line-height: 1.35;  
  }  
  
  #bar {  
    position: fixed;  
    right: 10px;  
    top: 10px;  
    display: flex;  
    gap: 6px;  
    z-index: 5;  
  }  
  
  .slot {  
    width: 38px;  
    height: 38px;  
    border-radius: 10px;  
    display: grid;  
    place-items: center;  
    color: #fff;  
    font-weight: 700;  
    background: rgba(0,0,0,.28);  
    border: 1px solid rgba(255,255,255,.18);  
    user-select: none;  
  }  
  
  .slot.sel {  
    outline: 2px solid #9fd1ff;  
    border-color: #9fd1ff;  
  }  
</style>  
</head>  
<body>  
  
<div id="hud">  
  <div id="hearts"></div>  
  <div id="info">  
    WASD / стрелки — идти<br>  
    Пробел — прыжок<br>  
    ЛКМ — ломать / бить / открыть дверь<br>  
    Shift + ЛКМ — сломать дверь<br>  
    ПКМ — ставить<br>  
    1–6 / колёсико — выбор блока<br>  
    R — новый мир  
  </div>  
</div>  
  
<div id="bar"></div>  
<canvas id="c"></canvas>  
  
<script>  
(() => {  
  const canvas = document.getElementById("c");  
  const ctx = canvas.getContext("2d");  
  const heartsEl = document.getElementById("hearts");  
  const bar = document.getElementById("bar");  
  
  function fit() {  
    const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));  
    canvas.width = Math.round(innerWidth * dpr);  
    canvas.height = Math.round(innerHeight * dpr);  
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  
  }  
  addEventListener("resize", fit, { passive: true });  
  fit();  
  
  const TILE = 32;  
  const W = 220;  
  const H = 90;  
  
  const GRAV = 1400;  
  const PLAYER_MOVE = 130;  
  const PLAYER_JUMP = 500;  
  
  const SAFE_SPAWN_MIN = 1200;  
  const SAFE_SPAWN_RANDOM = 600;  
  
  const BLOCK = {  
    AIR: 0,  
    GRASS: 1,  
    DIRT: 2,  
    STONE: 3,  
    WOOD: 4,  
    SAND: 5,  
    DOOR_B: 6,  
    DOOR_T: 7,  
    DOOR_B_OPEN: 8,  
    DOOR_T_OPEN: 9,  
    LEAVES: 10  
  };  
  
  const COLORS = {  
    [BLOCK.GRASS]: ['#2aa84a', '#1f7f37'],  
    [BLOCK.DIRT]:  ['#8a5a34', '#6b4528'],  
    [BLOCK.STONE]: ['#8e98a5', '#707984'],  
    [BLOCK.WOOD]:  ['#b07b3a', '#8e612e'],  
    [BLOCK.SAND]:  ['#e2d39b', '#cdbf85']  
  };  
  
  const hotbar = [  
    BLOCK.GRASS,  
    BLOCK.DIRT,  
    BLOCK.STONE,  
    BLOCK.WOOD,  
    BLOCK.SAND,  
    BLOCK.DOOR_B  
  ];  
  let selected = hotbar[0];  
  
  const slots = hotbar.map((id, i) => {  
    const el = document.createElement("div");  
    el.className = "slot" + (i === 0 ? " sel" : "");  
    el.textContent = String(i + 1);  
    bar.appendChild(el);  
    return el;  
  });  
  
  function updateSlots() {  
    slots.forEach((el, i) => el.classList.toggle("sel", hotbar[i] === selected));  
  }  
  
  const world = new Uint8Array(W * H);  
  const idx = (x, y) => x + y * W;  
  const inside = (x, y) => x >= 0 && y >= 0 && x < W && y < H;  
  const get = (x, y) => inside(x, y) ? world[idx(x, y)] : BLOCK.STONE;  
  const set = (x, y, v) => { if (inside(x, y)) world[idx(x, y)] = v; };  
  
  function isDoor(id) {  
    return id === BLOCK.DOOR_B || id === BLOCK.DOOR_T || id === BLOCK.DOOR_B_OPEN || id === BLOCK.DOOR_T_OPEN;  
  }  
  
  function isSolid(id) {  
    return id !== BLOCK.AIR && id !== BLOCK.DOOR_B_OPEN && id !== BLOCK.DOOR_T_OPEN;  
  }  
  
  function solidAtPx(px, py) {  
    return isSolid(get(Math.floor(px / TILE), Math.floor(py / TILE)));  
  }  
  
  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {  
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;  
  }  
  
  function getDoorBase(tx, ty) {  
    const id = get(tx, ty);  
    if (id === BLOCK.DOOR_B || id === BLOCK.DOOR_B_OPEN) return { x: tx, y: ty };  
    if (id === BLOCK.DOOR_T || id === BLOCK.DOOR_T_OPEN) return { x: tx, y: ty + 1 };  
    return null;  
  }  
  
  function breakDoor(tx, ty) {  
    const base = getDoorBase(tx, ty);  
    if (!base) return;  
    set(base.x, base.y, BLOCK.AIR);  
    set(base.x, base.y - 1, BLOCK.AIR);  
  }  
  
  function canCloseDoor(tx, ty) {  
    const base = getDoorBase(tx, ty);  
    if (!base) return false;  
  
    const rects = [  
      { x: base.x * TILE, y: base.y * TILE, w: TILE, h: TILE },  
      { x: base.x * TILE, y: (base.y - 1) * TILE, w: TILE, h: TILE }  
    ];  
  
    for (const r of rects) {  
      if (rectsOverlap(r.x, r.y, r.w, r.h, player.x, player.y, player.w, player.h)) return false;  
      for (const m of monsters) {  
        if (rectsOverlap(r.x, r.y, r.w, r.h, m.x, m.y, m.w, m.h)) return false;  
      }  
    }  
    return true;  
  }  
  
  function toggleDoor(tx, ty) {  
    const base = getDoorBase(tx, ty);  
    if (!base) return;  
  
    const b = get(base.x, base.y);  
    const t = get(base.x, base.y - 1);  
  
    if (b === BLOCK.DOOR_B && t === BLOCK.DOOR_T) {  
      set(base.x, base.y, BLOCK.DOOR_B_OPEN);  
      set(base.x, base.y - 1, BLOCK.DOOR_T_OPEN);  
      return;  
    }  
  
    if (b === BLOCK.DOOR_B_OPEN && t === BLOCK.DOOR_T_OPEN && canCloseDoor(tx, ty)) {  
      set(base.x, base.y, BLOCK.DOOR_B);  
      set(base.x, base.y - 1, BLOCK.DOOR_T);  
    }  
  }  
  
  const player = {  
    x: W * TILE * 0.5,  
    y: 100,  
    w: 22,  
    h: 46,  
    vx: 0,  
    vy: 0,  
    onGround: false,  
    hp: 5,  
    hitTimer: 0,
    regenTimer: 0  
  };  
  
  function centerCameraOnPlayer() {  
    camX = player.x + player.w / 2 - innerWidth / 2;  
    camY = player.y + player.h / 2 - innerHeight / 2;  
    camX = Math.max(0, Math.min(camX, W * TILE - innerWidth));  
    camY = Math.max(0, Math.min(camY, H * TILE - innerHeight));  
  }  
  
  function resetPlayerPosition() {  
    player.x = W * TILE * 0.5;  
    player.y = 100;  
    player.vx = 0;  
    player.vy = 0;  
    centerCameraOnPlayer();  
  }  
  
  function updateHearts() {  
    heartsEl.textContent = "";  
    for (let i = 0; i < 5; i++) heartsEl.textContent += i < player.hp ? "❤️" : "🖤";  
  }  
  updateHearts();  
  
  const monsters = [];  
  const clouds = [];  
  const stars = [];  
  
  let camX = 0;  
  let camY = 0;  
  
  let dayTime = 0;  
  let lastNightState = false;  
  let spawnTimer = 0;  
  
  const keys = {};  
  addEventListener("keydown", e => {  
    keys[e.key.toLowerCase()] = true;  
  
    if (e.key === "r" || e.key === "R") {  
      generateWorld();  
      resetPlayerPosition();  
      dayTime = 0;  
      lastNightState = false;  
      spawnTimer = 0;  
    }  
  
    const n = parseInt(e.key, 10);  
    if (n >= 1 && n <= hotbar.length) {  
      selected = hotbar[n - 1];  
      updateSlots();  
    }  
  });  
  
  addEventListener("keyup", e => {  
    keys[e.key.toLowerCase()] = false;  
  });  
  
  canvas.addEventListener("wheel", e => {  
    e.preventDefault();  
    const dir = e.deltaY > 0 ? 1 : -1;  
    let i = hotbar.indexOf(selected);  
    i = (i + dir + hotbar.length) % hotbar.length;  
    selected = hotbar[i];  
    updateSlots();  
  }, { passive: false });  
  
  canvas.addEventListener("contextmenu", e => e.preventDefault());  
  
  const mouse = { x: 0, y: 0 };  
  canvas.addEventListener("mousemove", e => {  
    const r = canvas.getBoundingClientRect();  
    mouse.x = e.clientX - r.left;  
    mouse.y = e.clientY - r.top;  
  });  
  
  function makeClouds() {  
    clouds.length = 0;  
    for (let i = 0; i < 16; i++) {  
      clouds.push({  
        x: Math.random() * (W * TILE),  
        y: 30 + Math.random() * 180,  
        w: 70 + Math.random() * 90,  
        h: 18 + Math.random() * 14,  
        speed: 7 + Math.random() * 8  
      });  
    }  
  }  
  
  function makeStars() {  
    stars.length = 0;  
    for (let i = 0; i < 80; i++) {  
      stars.push({  
        x: Math.random(),  
        y: Math.random() * 0.55,  
        size: Math.random() < 0.75 ? 1 : 2,  
        twinkle: Math.random() * Math.PI * 2  
      });  
    }  
  }  
  
  function spawnMonster(x, y) {  
    const test = {  
      x,  
      y,  
      w: 22,  
      h: 38  
    };  
  
    if (rectsOverlap(test.x, test.y, test.w, test.h, player.x, player.y, player.w, player.h)) {  
      return false;  
    }  
  
    for (const m of monsters) {  
      if (rectsOverlap(test.x, test.y, test.w, test.h, m.x, m.y, m.w, m.h)) {  
        return false;  
      }  
    }  
  
    monsters.push({  
      x,  
      y,  
      w: 22,  
      h: 38,  
      vx: 0,  
      vy: 0,  
      dir: Math.random() < 0.5 ? -1 : 1,  
      onGround: false,  
      hp: 3,  
      cooldown: 0  
    });  
  
    return true;  
  }  
  
  function findGroundY(worldX) {  
    const tx = Math.max(0, Math.min(W - 1, Math.floor(worldX / TILE)));  
    for (let y = 0; y < H; y++) {  
      if (isSolid(get(tx, y))) return y * TILE - 38;  
    }  
    return 100;  
  }  
  
  function countNearbyMonsters(x, radius) {  
    let count = 0;  
    for (const m of monsters) {  
      if (Math.abs((m.x + m.w / 2) - x) < radius) count++;  
    }  
    return count;  
  }  
  
  function spawnMonsterNearPlayer() {  
    if (monsters.length >= 20) return;  
  
    let tries = 0;  
  
    while (tries < 20) {  
      const side = Math.random() < 0.5 ? -1 : 1;  
      const dist = SAFE_SPAWN_MIN + Math.random() * SAFE_SPAWN_RANDOM;  
      const x = player.x + side * dist;  
  
      if (x < 64 || x > W * TILE - 64) {  
        tries++;  
        continue;  
      }  
  
      if (countNearbyMonsters(x, 240) >= 3) {  
        tries++;  
        continue;  
      }  
  
      const y = findGroundY(x);  
  
      if (spawnMonster(x, y)) return;  
      tries++;  
    }  
  }  
  
  function trimDayMonsters() {  
    if (monsters.length <= 4) return;  
    for (let i = monsters.length - 1; i >= 0; i--) {  
      const m = monsters[i];  
      const far = Math.abs(m.x - player.x) > 700;  
      if (far && monsters.length > 4) monsters.splice(i, 1);  
    }  
  }  
  
  function generateWorld() {  
    world.fill(BLOCK.AIR);  
    monsters.length = 0;  
  
    let h = Math.floor(H * 0.56);  
    let slope = 0;  
  
    for (let x = 0; x < W; x++) {  
      slope += (Math.random() * 2 - 1) * 0.22;  
      slope *= 0.92;  
      h += slope;  
      h = Math.max(38, Math.min(62, h));  
  
      const top = Math.floor(h);  
      set(x, top, BLOCK.GRASS);  
  
      for (let y = top + 1; y < H; y++) {  
        if (y < top + 5) set(x, y, BLOCK.DIRT);  
        else set(x, y, BLOCK.STONE);  
      }  
  
      if (Math.random() < 0.045) {  
        const th = 4 + (Math.random() * 3 | 0);  
  
        for (let t = 1; t <= th; t++) {  
          if (top - t >= 0) set(x, top - t, BLOCK.WOOD);  
        }  
  
        const leafTop = top - th;  
  
        for (let dx = -2; dx <= 2; dx++) {  
          for (let dy = -2; dy <= 2; dy++) {  
            const ax = x + dx;  
            const ay = leafTop + dy;  
            if (!inside(ax, ay)) continue;  
            if (Math.abs(dx) + Math.abs(dy) <= 3 && get(ax, ay) === BLOCK.AIR) {  
              set(ax, ay, BLOCK.LEAVES);  
            }  
          }  
        }  
  
        if (inside(x, leafTop - 2) && get(x, leafTop - 2) === BLOCK.AIR) {  
          set(x, leafTop - 2, BLOCK.LEAVES);  
        }  
      }  
  
      if (Math.random() < 0.04) {  
        for (let y = top; y < Math.min(H, top + 3); y++) set(x, y, BLOCK.SAND);  
      }  
    }  
  
    for (let i = 0; i < 5; i++) {  
      let tries = 0;  
  
      while (tries < 30) {  
        const side = Math.random() < 0.5 ? -1 : 1;  
        const mx = player.x + side * (SAFE_SPAWN_MIN + Math.random() * SAFE_SPAWN_RANDOM);  
        const clampedX = Math.max(64, Math.min(W * TILE - 64, mx));  
        const my = findGroundY(clampedX);  
  
        if (spawnMonster(clampedX, my)) break;  
        tries++;  
      }  
    }  
  
    player.hp = 5;  
    player.hitTimer = 0;  
    updateHearts();  
    makeClouds();  
    makeStars();  
    centerCameraOnPlayer();  
  }  
  
  generateWorld();  
  resetPlayerPosition();  
  
  function damagePlayer() {  
    if (player.hitTimer > 0) return;  
    player.hp--;  
    player.hitTimer = 1.0;  
    updateHearts();  
  
    if (player.hp <= 0) {  
      alert("Ты проиграл. Мир создан заново.");  
      generateWorld();  
      resetPlayerPosition();  
      dayTime = 0;  
      lastNightState = false;  
      spawnTimer = 0;  
    }  
  }  
  
  canvas.addEventListener("mousedown", e => {  
    if (e.button !== 0 && e.button !== 2) return;  
  
    const worldX = mouse.x + camX;  
    const worldY = mouse.y + camY;  
    const tx = Math.floor(worldX / TILE);  
    const ty = Math.floor(worldY / TILE);  
  
    const px = player.x + player.w / 2;  
    const py = player.y + player.h / 2;  
    if (Math.hypot((tx + 0.5) * TILE - px, (ty + 0.5) * TILE - py) > 270) return;  
  
    if (e.button === 0) {  
      const id = get(tx, ty);  
  
      if (isDoor(id)) {  
        if (e.shiftKey) breakDoor(tx, ty);  
        else toggleDoor(tx, ty);  
        return;  
      }  
  
      for (let i = monsters.length - 1; i >= 0; i--) {  
        const m = monsters[i];  
        if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h)) {  
          m.hp--;  
          m.cooldown = 0.3;  
          if (m.hp <= 0) monsters.splice(i, 1);  
          return;  
        }  
      }  
  
      if (id !== BLOCK.AIR) set(tx, ty, BLOCK.AIR);  
      return;  
    }  
  
    if (selected === BLOCK.DOOR_B) {  
      if (!inside(tx, ty) || !inside(tx, ty - 1)) return;  
      if (get(tx, ty) !== BLOCK.AIR || get(tx, ty - 1) !== BLOCK.AIR) return;  
  
      if (  
        rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, player.x, player.y, player.w, player.h) ||  
        rectsOverlap(tx * TILE, (ty - 1) * TILE, TILE, TILE, player.x, player.y, player.w, player.h)  
      ) return;  
  
      for (const m of monsters) {  
        if (  
          rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h) ||  
          rectsOverlap(tx * TILE, (ty - 1) * TILE, TILE, TILE, m.x, m.y, m.w, m.h)  
        ) return;  
      }  
  
      set(tx, ty, BLOCK.DOOR_B);  
      set(tx, ty - 1, BLOCK.DOOR_T);  
      return;  
    }  
  
    if (get(tx, ty) !== BLOCK.AIR) return;  
  
    if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, player.x, player.y, player.w, player.h)) return;  
    for (const m of monsters) {  
      if (rectsOverlap(tx * TILE, ty * TILE, TILE, TILE, m.x, m.y, m.w, m.h)) return;  
    }  
  
    set(tx, ty, selected);  
  });  
  
  function moveBody(body, dt) {  
    body.onGround = false;  
  
    body.x += body.vx * dt;  
    if (body.vx !== 0) {  
      const dir = Math.sign(body.vx);  
      const edgeX = dir > 0 ? body.x + body.w : body.x;  
      const eps = dir > 0 ? -0.001 : 0.001;  
  
      for (let y = body.y + 2; y < body.y + body.h - 2; y += 10) {  
        if (solidAtPx(edgeX + eps, y)) {  
          body.x = dir > 0  
            ? Math.floor(edgeX / TILE) * TILE - body.w  
            : (Math.floor(edgeX / TILE) + 1) * TILE;  
          body.vx = 0;  
          break;  
        }  
      }  
    }  
  
    body.y += body.vy * dt;  
    if (body.vy !== 0) {  
      const dir = Math.sign(body.vy);  
      const edgeY = dir > 0 ? body.y + body.h : body.y;  
      const eps = dir > 0 ? -0.001 : 0.001;  
  
      for (let x = body.x + 2; x < body.x + body.w - 2; x += 10) {  
        if (solidAtPx(x, edgeY + eps)) {  
          body.y = dir > 0  
            ? Math.floor(edgeY / TILE) * TILE - body.h  
            : (Math.floor(edgeY / TILE) + 1) * TILE;  
          body.vy = 0;  
          if (dir > 0) body.onGround = true;  
          break;  
        }  
      }  
    }  
  }  
  
  function updateMonster(m, dt) {  
    if (m.cooldown > 0) m.cooldown -= dt;  
  
    const playerCenter = player.x + player.w / 2;  
    const monsterCenter = m.x + m.w / 2;  
    const dx = playerCenter - monsterCenter;  
    const dist = Math.abs(dx);  
  
    let targetDir = m.dir;  
    let targetSpeed = 32;  
  
    if (dist < 280) {  
      targetDir = dx > 0 ? 1 : -1;  
      targetSpeed = 82;  
    }  
  
    m.dir = targetDir;  
    m.vx = targetSpeed * m.dir;  
    m.vy += GRAV * dt;  
  
    const frontX = m.dir > 0 ? m.x + m.w + 2 : m.x - 2;  
    const wallMidY = m.y + m.h - 14;  
    const footAheadY = m.y + m.h + 2;  
  
    const wallAhead = solidAtPx(frontX, wallMidY);  
    const noGroundAhead = !solidAtPx(frontX, footAheadY);  
  
    if (m.onGround && wallAhead) {  
      m.vy = -430;  
      m.onGround = false;  
    } else if (m.onGround && noGroundAhead && dist < 280) {  
      m.vy = -360;  
      m.onGround = false;  
    }  
  
    moveBody(m, dt);  
  
    if (m.vx === 0 && m.onGround) {  
      m.dir *= -1;  
    }  
  }  
  
  function mix(a, b, t) {  
    return a + (b - a) * t;  
  }  
  
  function drawBackground(dayT) {  
    const topR = Math.round(mix(12, 135, dayT));  
    const topG = Math.round(mix(20, 206, dayT));  
    const topB = Math.round(mix(42, 255, dayT));  
  
    const midR = Math.round(mix(18, 105, dayT));  
    const midG = Math.round(mix(26, 184, dayT));  
    const midB = Math.round(mix(55, 255, dayT));  
  
    const botR = Math.round(mix(18, 200, dayT));  
    const botG = Math.round(mix(22, 236, dayT));  
    const botB = Math.round(mix(38, 255, dayT));  
  
    const g = ctx.createLinearGradient(0, 0, 0, innerHeight);  
    g.addColorStop(0, `rgb(${topR},${topG},${topB})`);  
    g.addColorStop(0.55, `rgb(${midR},${midG},${midB})`);  
    g.addColorStop(1, `rgb(${botR},${botG},${botB})`);  
    ctx.fillStyle = g;  
    ctx.fillRect(0, 0, innerWidth, innerHeight);  
  }  
  
  function drawStars(nightAlpha, now) {  
    if (nightAlpha <= 0.01) return;  
    ctx.fillStyle = "#ffffff";  
    ctx.globalAlpha = nightAlpha * 0.95;  
  
    for (const s of stars) {  
      const tw = 0.65 + 0.35 * Math.sin(now * 0.002 + s.twinkle);  
      ctx.globalAlpha = nightAlpha * tw;  
      const x = s.x * innerWidth;  
      const y = s.y * innerHeight;  
      ctx.fillRect(x, y, s.size, s.size);  
    }  
  
    ctx.globalAlpha = 1;  
  }  
  
  function drawSunMoon(dayT, timeNorm) {  
    const arcX = innerWidth * (0.1 + 0.8 * timeNorm);  
    const arcY = innerHeight * 0.78 - Math.sin(timeNorm * Math.PI) * innerHeight * 0.6;  
  
    const nightAlpha = 1 - dayT;  
  
    if (dayT > 0.05) {  
      ctx.globalAlpha = dayT * 0.95;  
      ctx.fillStyle = "#ffe38a";  
      ctx.beginPath();  
      ctx.arc(arcX, arcY, 26, 0, Math.PI * 2);  
      ctx.fill();  
    }  
  
    if (nightAlpha > 0.05) {  
      ctx.globalAlpha = nightAlpha * 0.9;  
      ctx.fillStyle = "#e6ecff";  
      ctx.beginPath();  
      ctx.arc(arcX, arcY, 20, 0, Math.PI * 2);  
      ctx.fill();  
  
      ctx.fillStyle = `rgba(20,30,60,${nightAlpha})`;  
      ctx.beginPath();  
      ctx.arc(arcX + 7, arcY - 3, 18, 0, Math.PI * 2);  
      ctx.fill();  
    }  
  
    ctx.globalAlpha = 1;  
  }  
  
  function drawClouds(dayT) {  
    for (const c of clouds) {  
      const px = c.x - camX * 0.35;  
      const py = c.y - camY * 0.08;  
  
      ctx.globalAlpha = 0.28 + 0.55 * dayT;  
      ctx.fillStyle = "#ffffff";  
  
      ctx.beginPath();  
      ctx.roundRect(px, py, c.w, c.h, 10);  
      ctx.fill();  
  
      ctx.beginPath();  
      ctx.arc(px + c.w * 0.25, py + 4, c.h * 0.65, 0, Math.PI * 2);  
      ctx.arc(px + c.w * 0.48, py - 2, c.h * 0.95, 0, Math.PI * 2);  
      ctx.arc(px + c.w * 0.72, py + 2, c.h * 0.72, 0, Math.PI * 2);  
      ctx.fill();  
    }  
    ctx.globalAlpha = 1;  
  }  
  
  function drawTile(x, y, id) {  
    const px = x * TILE - camX;  
    const py = y * TILE - camY;  
  
    if (id === BLOCK.LEAVES) {  
      ctx.fillStyle = '#49b458';  
      ctx.fillRect(px, py, TILE, TILE);  
  
      ctx.fillStyle = '#2f8f3d';  
      ctx.fillRect(px, py + TILE - 7, TILE, 7);  
      ctx.fillRect(px + TILE - 7, py, 7, TILE);  
  
      ctx.fillStyle = '#267532';  
      for (let i = 0; i < 14; i++) {  
        const nx = px + (((x * 37 + y * 17 + i * 13) % TILE + TILE) % TILE);  
        const ny = py + (((x * 19 + y * 29 + i * 7) % TILE + TILE) % TILE);  
        ctx.fillRect(nx, ny, 2, 2);  
      }  
  
      ctx.fillStyle = '#7be285';  
      for (let i = 0; i < 8; i++) {  
        const nx = px + (((x * 11 + y * 23 + i * 5) % TILE + TILE) % TILE);  
        const ny = py + (((x * 31 + y * 13 + i * 9) % TILE + TILE) % TILE);  
        ctx.fillRect(nx, ny, 1, 1);  
      }  
      return;  
    }  
  
    if (id === BLOCK.DOOR_B) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + 5, py, TILE - 10, TILE);  
      ctx.fillStyle = '#5a3213';  
      ctx.fillRect(px + TILE - 10, py, 5, TILE);  
      ctx.fillStyle = '#d9b36a';  
      ctx.beginPath();  
      ctx.arc(px + TILE - 13, py + TILE / 2, 2.5, 0, Math.PI * 2);  
      ctx.fill();  
      return;  
    }  
  
    if (id === BLOCK.DOOR_T) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + 5, py, TILE - 10, TILE);  
      ctx.strokeStyle = 'rgba(255,220,170,0.35)';  
      ctx.strokeRect(px + 9, py + 6, TILE - 18, TILE - 12);  
      return;  
    }  
  
    if (id === BLOCK.DOOR_B_OPEN) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + TILE - 8, py, 6, TILE);  
      ctx.fillStyle = '#d9b36a';  
      ctx.beginPath();  
      ctx.arc(px + TILE - 11, py + TILE / 2, 2.5, 0, Math.PI * 2);  
      ctx.fill();  
      return;  
    }  
  
    if (id === BLOCK.DOOR_T_OPEN) {  
      ctx.fillStyle = '#7a4a1f';  
      ctx.fillRect(px + TILE - 8, py, 6, TILE);  
      ctx.strokeStyle = 'rgba(255,220,170,0.35)';  
      ctx.strokeRect(px + TILE - 18, py + 6, 8, TILE - 12);  
      return;  
    }  
  
    const pal = COLORS[id];  
    if (!pal) return;  
  
    ctx.fillStyle = pal[0];  
    ctx.fillRect(px, py, TILE, TILE);  
  
    ctx.fillStyle = pal[1];  
    ctx.fillRect(px, py + TILE - 7, TILE, 7);  
    ctx.fillRect(px + TILE - 7, py, 7, TILE);  
  
    ctx.globalAlpha = 0.11;  
    for (let i = 0; i < 4; i++) {  
      const nx = px + (((x * 17 + y * 11 + i * 7) % TILE + TILE) % TILE);  
      const ny = py + (((x * 13 + y * 19 + i * 5) % TILE + TILE) % TILE);  
      ctx.fillRect(nx, ny, 2, 2);  
    }  
    ctx.globalAlpha = 1;  
  }  
  
  function drawPlayer() {  
    const px = player.x - camX;  
    const py = player.y - camY;  
  
    if (player.hitTimer > 0 && Math.floor(player.hitTimer * 20) % 2 === 0) {  
      ctx.globalAlpha = 0.5;  
    }  
  
    ctx.fillStyle = "#f2c39b";  
    ctx.fillRect(px + 5, py + 8, player.w - 10, 14);  
  
    ctx.fillStyle = "#2d7bd6";  
    ctx.fillRect(px + 4, py + 22, player.w - 8, player.h - 26);  
  
    ctx.fillStyle = "#111";  
    ctx.fillRect(px + 8, py + 12, 3, 3);  
    ctx.fillRect(px + player.w - 11, py + 12, 3, 3);  
  
    ctx.globalAlpha = 0.95;  
    ctx.fillStyle = selected === BLOCK.DOOR_B ? "#7a4a1f" : (COLORS[selected] ? COLORS[selected][0] : "#fff");  
    ctx.fillRect(px + player.w - 8, py + player.h - 22, 14, 14);  
    ctx.globalAlpha = 1;  
  }  
  
  function drawMonsters() {  
    for (const m of monsters) {  
      const px = m.x - camX;  
      const py = m.y - camY;  
  
      ctx.fillStyle = "#6f2222";  
      ctx.fillRect(px, py + 8, m.w, m.h - 8);  
  
      ctx.fillStyle = "#8f2d2d";  
      ctx.fillRect(px + 2, py, m.w - 4, 14);  
  
      ctx.fillStyle = "#ff4a4a";  
      ctx.fillRect(px + 4, py + 4, 4, 4);  
      ctx.fillRect(px + m.w - 8, py + 4, 4, 4);  
  
      ctx.fillStyle = "#2b0c0c";  
      ctx.fillRect(px + 5, py + m.h - 6, 4, 6);  
      ctx.fillRect(px + m.w - 9, py + m.h - 6, 4, 6);  
  
      ctx.fillStyle = "#1f1f1f";  
      ctx.fillRect(px - 1, py - 8, 20, 5);  
      ctx.fillStyle = "#ff5555";  
      ctx.fillRect(px, py - 7, m.hp * 6, 3);  
    }  
  }  
  
  function drawTarget() {  
    const tx = Math.floor((mouse.x + camX) / TILE);  
    const ty = Math.floor((mouse.y + camY) / TILE);  
    const px = tx * TILE - camX;  
    const py = ty * TILE - camY;  
  
    ctx.globalAlpha = 0.8;  
    ctx.strokeStyle = "rgba(140,190,255,0.9)";  
    ctx.lineWidth = 2;  
    ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);  
    ctx.globalAlpha = 1;  
  }  
  
  let last = performance.now();  
  
  function loop(now) {  
    const dt = Math.min(0.033, (now - last) / 1000);  
    last = now;  
  
    const dayCycleSeconds = 180;  
    dayTime = (dayTime + dt / dayCycleSeconds) % 1;  
    const dayT = Math.max(0, Math.sin(dayTime * Math.PI));  
    const nightAlpha = 1 - dayT;  
    const isNight = dayT < 0.35;  
  
    if (!isNight && lastNightState) {  
      trimDayMonsters();  
    }  
    lastNightState = isNight;  
  
    spawnTimer += dt;  
    if (isNight) {  
      if (spawnTimer >= 3.2) {  
        spawnTimer = 0;  
        spawnMonsterNearPlayer();  
      }  
    } else {  
      if (spawnTimer >= 7.5) {  
        spawnTimer = 0;  
        if (monsters.length < 6) spawnMonsterNearPlayer();  
      }  
    }  
  
    for (const c of clouds) {  
      c.x += c.speed * dt;  
      if (c.x - c.w > W * TILE + 300) {  
        c.x = -250 - Math.random() * 200;  
        c.y = 30 + Math.random() * 180;  
      }  
    }  
  
    let ax = 0;  
    if (keys["a"] || keys["arrowleft"]) ax -= 1;  
    if (keys["d"] || keys["arrowright"]) ax += 1;  
  
    const friction = player.onGround ? 0.55 : 0.97;  
    const air = player.onGround ? 1 : 0.05;  
  
    player.vx += ax * PLAYER_MOVE * air * 1.6;  
    player.vx *= friction;  
    player.vy += GRAV * dt;  
  
    if ((keys[" "] || keys["w"] || keys["arrowup"]) && player.onGround) {  
      player.vy = -PLAYER_JUMP;  
      player.onGround = false;  
    }  
  
    moveBody(player, dt);  
  
    for (const m of monsters) {  
      updateMonster(m, dt);  
      if (rectsOverlap(player.x, player.y, player.w, player.h, m.x, m.y, m.w, m.h)) {  
        damagePlayer();  
      }  
    }  
  
    if (player.hitTimer > 0) {  
      player.hitTimer -= dt;  
      if (player.hitTimer < 0) player.hitTimer = 0;  
    }  

    // регенерация здоровья
if (player.hitTimer === 0 && player.hp < 5) {

  player.regenTimer += dt;

  if (player.regenTimer > 4) {
    player.hp++;
    player.regenTimer = 0;
    updateHearts();
  }

} else {
  player.regenTimer = 0;
}
  
    centerCameraOnPlayer();  
  
    drawBackground(dayT);  
    drawStars(nightAlpha, now);  
    drawSunMoon(dayT, dayTime);  
    drawClouds(dayT);  
  
    const x0 = Math.max(0, Math.floor(camX / TILE) - 2);  
    const y0 = Math.max(0, Math.floor(camY / TILE) - 2);  
    const x1 = Math.min(W - 1, Math.floor((camX + innerWidth) / TILE) + 2);  
    const y1 = Math.min(H - 1, Math.floor((camY + innerHeight) / TILE) + 2);  
  
    for (let y = y0; y <= y1; y++) {  
      for (let x = x0; x <= x1; x++) {  
        const id = get(x, y);  
        if (id !== BLOCK.AIR) drawTile(x, y, id);  
      }  
    }  
  
    drawMonsters();  
    drawPlayer();  
    drawTarget();  
  
    requestAnimationFrame(loop);  
  }  
  
  updateSlots();  
  requestAnimationFrame(loop);  
})();  
</script>  
</body>
